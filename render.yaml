services:
  - type: web
    name: gradescope-api
    runtime: python
    rootDir: gradescope-api
    buildCommand: pip install uv && uv sync
    startCommand: uv run uvicorn api:root_app --host 0.0.0.0 --port $PORT --app-dir src/gradescopeapi/api
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
